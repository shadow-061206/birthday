
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Happy Birthday Begum Ji...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Pacifico&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Quicksand', sans-serif;
        background-color: #fff5f5;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }
      .font-romantic {
        font-family: 'Dancing Script', cursive;
      }
      .font-pacifico {
        font-family: 'Pacifico', cursive;
      }
      @keyframes fall {
        0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
        100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
      }
      .petal {
        position: fixed;
        top: -50px;
        pointer-events: none;
        z-index: 0; /* Lowered so it doesn't block clicks */
        animation: fall linear infinite;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #fff5f5;
      }
      ::-webkit-scrollbar-thumb {
        background: #f43f5e;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #e11d48;
      }
      .page-transition {
        animation: fadeIn 0.5s ease-out forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
